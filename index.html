<!DOCTYPE html>
<html>
<head>
<title>RESCUE BOT</title>

<style>
body{
    background:#202020;
    color:white;
    text-align:center;
    font-family:Arial;
}

h1{
    color:#00ff88;
}

button{
    width:90px;
    height:90px;
    font-size:30px;
    margin:5px;
}

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    font-size:24px;
}
</style>

</head>
<body>

<div id="overlay">
🔴 Connecting to RESCUE BOT...
</div>

<h1>RESCUE BOT</h1>

<button id="forward">F</button>
<br>

<button id="left">L</button>
<button id="aid">KIT</button>
<button id="right">R</button>
<br>

<button id="backward">B</button>

<script>

const ESP = "http://192.168.4.1";

let connected = false;

async function checkESP(){

    try{
        const res = await fetch(`${ESP}/status`);
        const text = await res.text();

        if(text.includes("ONLINE")){
            connected = true;
            document.getElementById("overlay").style.display="none";
        }
    }
    catch{
        connected = false;
        document.getElementById("overlay").style.display="flex";
    }
}

setInterval(checkESP,3000);
checkESP();

function send(cmd){
    if(!connected) return;

    fetch(`${ESP}/${cmd}`)
    .catch(err=>console.log(err));
}

function hold(button,cmd){

    button.addEventListener("touchstart",()=>{
        send(cmd);
    });

    button.addEventListener("touchend",()=>{
        send("stop");
    });

    button.addEventListener("mousedown",()=>{
        send(cmd);
    });

    button.addEventListener("mouseup",()=>{
        send("stop");
    });

    button.addEventListener("mouseleave",()=>{
        send("stop");
    });
}

hold(document.getElementById("forward"),"forward");
hold(document.getElementById("backward"),"backward");
hold(document.getElementById("left"),"left");
hold(document.getElementById("right"),"right");

document.getElementById("aid").addEventListener("click",()=>{
    send("open");
});

</script>

</body>
</html>
